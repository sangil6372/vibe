<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIc 시험 결과</title>
<link rel="stylesheet" href="../assets/css/noto-sans-kr.css">
<link rel="stylesheet" href="../assets/css/design-system.css">
<link rel="stylesheet" href="../assets/css/result.css">
<script src="../assets/js/config.js"></script>
<script src="../assets/js/vue.global.js" onerror="this.onerror=null;this.src='../assets/js/vue.global.js'"></script>
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div class="loading-overlay" v-if="loading">
    <div class="spinner"></div>
    <div class="loading-text">{{ loadingText }}</div>
  </div>

  <!-- Header -->
  <header class="header">
    <h1>📋 OPIc 시험 결과</h1>
    <a href="opic-test.html" class="btn-retry">🔄 다시 시험 보기</a>
  </header>

  <div class="container">

    <!-- 데이터 없음 -->
    <div class="empty-state" v-if="!session">
      <div class="icon">📭</div>
      <p>시험 결과 데이터가 없습니다.</p>
      <a href="opic-test.html" style="color:var(--color-secondary);margin-top:12px;display:inline-block">시험 시작하기 →</a>
    </div>

    <template v-if="session && overall">

      <!-- ── 최종 등급 카드 ── -->
      <div class="grade-card">
        <div class="grade-label">최종 예상 등급</div>
        <div :class="['grade-badge', 'grade-' + overall.grade]">{{ overall.grade }}</div>
        <div class="grade-rationale">{{ overall.gradeRationale }}</div>
      </div>

      <!-- ── OPIc Diagnostic Comments Form ── -->
      <div class="section diag-wrap" v-if="overall.diagnostic">
        <div class="section-title">📋 OPIc Diagnostic Comments</div>

        <div class="diag-info-grid">
          <div class="diag-info-row"><span class="dil">Language</span><span class="div2">ENGLISH</span></div>
          <div class="diag-info-row"><span class="dil">Test Results</span><span :class="['div2','grade-'+overall.grade]" style="font-weight:700">{{ overall.grade }}</span></div>
        </div>

        <div class="diag-section-head">• DIAGNOSTIC FORM</div>

        <!-- ADVANCED FUNCTIONS -->
        <table class="diag-table">
          <colgroup><col style="width:22%"><col style="width:14%"><col></colgroup>
          <thead>
            <tr>
              <th>ADVANCED FUNCTIONS</th>
              <th>PERFORMANCE</th>
              <th>If does not fully meet criteria for Advanced Level, what features does speaker need to improve?</th>
            </tr>
          </thead>
          <tbody>
            <!-- ADV1 -->
            <tr>
              <td class="diag-func">Can narrate and describe in all time frames.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('adv1'))]">{{ dPerf('adv1') }}</span></td>
              <td class="diag-detail">
                <div class="dgl">Speaker needs to improve:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv1','time_checks','present_desc')}]">Description in present time</span>
                  <span :class="['dc',{checked:dHas('adv1','time_checks','past_desc')}]">Description in past time</span>
                  <span :class="['dc',{checked:dHas('adv1','time_checks','future_desc')}]">Description in future time</span>
                </div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv1','time_checks','present_narr')}]">Narration in present time</span>
                  <span :class="['dc',{checked:dHas('adv1','time_checks','past_narr')}]">Narration in past time</span>
                  <span :class="['dc',{checked:dHas('adv1','time_checks','future_narr')}]">Narration in future time</span>
                </div>
                <div class="dgl">Speaker's narrations show problems in:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv1','narr_problems','logical_seq')}]">Logical sequencing</span>
                  <span :class="['dc',{checked:dHas('adv1','narr_problems','verb_forms')}]">Verb forms</span>
                  <span :class="['dc',{checked:dHas('adv1','narr_problems','person_markers')}]">Person markers</span>
                </div>
                <div class="dgl">Speaker's descriptions lack:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv1','desc_lacks','clarity')}]">Clarity</span>
                  <span :class="['dc',{checked:dHas('adv1','desc_lacks','detail')}]">Detail</span>
                </div>
              </td>
            </tr>
            <!-- ADV2 -->
            <tr>
              <td class="diag-func">Can consistently produce connected discourse of paragraph length.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('adv2'))]">{{ dPerf('adv2') }}</span></td>
              <td class="diag-detail">
                <div class="dgl">Speaker produces mainly:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dGet('adv2','discourse_level')==='words_phrases'}]">Words and phrases</span>
                  <span :class="['dc',{checked:dGet('adv2','discourse_level')==='sentences'}]">Sentences</span>
                  <span :class="['dc',{checked:dGet('adv2','discourse_level')==='strings_sentences'}]">Strings of sentences</span>
                </div>
                <div class="drc">
                  <span :class="['dc',{checked:dGet('adv2','discourse_level')==='connected_sentences'}]">Connected sentences</span>
                  <span :class="['dc',{checked:dGet('adv2','discourse_level')==='skeletal_paragraphs'}]">Skeletal paragraphs</span>
                </div>
                <div class="dgl">Speaker exhibits problems with the word order of:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv2','word_order','phrases')}]">Phrases</span>
                  <span :class="['dc',{checked:dHas('adv2','word_order','sentences')}]">Sentences</span>
                  <span :class="['dc',{checked:dHas('adv2','word_order','paragraphs')}]">Paragraphs</span>
                </div>
                <div class="dgl">Speaker's use of cohesive devices:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv2','cohesive','not_used')}]">Not used</span>
                  <span :class="['dc',{checked:dHas('adv2','cohesive','used_inaccurately')}]">Used inaccurately</span>
                  <span :class="['dc',{checked:dHas('adv2','cohesive','repetitive')}]">Repetitive</span>
                </div>
              </td>
            </tr>
            <!-- ADV3 -->
            <tr>
              <td class="diag-func">Can speak about a variety of topics, including current events.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('adv3'))]">{{ dPerf('adv3') }}</span></td>
              <td class="diag-detail">
                <div class="dgl">Speaker needs to expand and improve vocabulary:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv3','vocab_checks','lacks_breadth')}]">Lacks breadth of vocabulary</span>
                  <span :class="['dc',{checked:dHas('adv3','vocab_checks','other_languages')}]">Uses words from other languages</span>
                  <span :class="['dc',{checked:dHas('adv3','vocab_checks','false_cognates')}]">Uses false cognates</span>
                </div>
              </td>
            </tr>
            <!-- ADV4 -->
            <tr>
              <td class="diag-func">Can deal effectively with an unanticipated complication.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('adv4'))]">{{ dPerf('adv4') }}</span></td>
              <td class="diag-detail">
                <div class="dgl">When confronted with unanticipated complication, the speaker:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dGet('adv4','complication')==='struggles_succeeds'}]">Struggles, but succeeds in addressing the situation</span>
                  <span :class="['dc',{checked:dGet('adv4','complication')==='attempts_fails'}]">Attempts to address, but is unable to successfully resolve the situation</span>
                  <span :class="['dc',{checked:dGet('adv4','complication')==='no_ability'}]">Demonstrates no linguistic ability to address the situation</span>
                </div>
                <div class="dgl">Speaker should improve:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dHas('adv4','improve_checks','communicative_devices')}]">Knowledge and use of communicative devices</span>
                </div>
              </td>
            </tr>
            <!-- ADV5 -->
            <tr>
              <td class="diag-func">Can be readily understood by speakers not accustomed to non-native speakers of the target language.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('adv5'))]">{{ dPerf('adv5') }}</span></td>
              <td class="diag-detail">
                <div class="dgl dcat">Grammar:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv5','grammar_checks','word_structure')}]">Word Structure</span>
                  <span :class="['dc',{checked:dHas('adv5','grammar_checks','syntax')}]">Syntax</span>
                  <span :class="['dc',{checked:dHas('adv5','grammar_checks','cases')}]">Cases</span>
                  <span :class="['dc',{checked:dHas('adv5','grammar_checks','prepositions')}]">Prepositions</span>
                  <span :class="['dc',{checked:dHas('adv5','grammar_checks','agreement')}]">Agreement</span>
                </div>
                <div class="dgl dcat">Pragmatic Competence:</div>
                <div class="drc">
                  <span :class="['dc',{checked:dHas('adv5','pragmatic_checks','lacks_strategies')}]">Lacks strategies to compensate for weaknesses</span>
                </div>
                <div class="dgl diag-na-note">Fluency / Pronunciation: <span>requires audio analysis — not evaluated</span></div>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- INTERMEDIATE FUNCTIONS -->
        <table class="diag-table" style="margin-top:12px">
          <colgroup><col style="width:22%"><col style="width:14%"><col></colgroup>
          <thead>
            <tr>
              <th>INTERMEDIATE FUNCTIONS</th>
              <th>PERFORMANCE</th>
              <th>If does not fully meet criteria for Intermediate Level, what features does speaker need to improve?</th>
            </tr>
          </thead>
          <tbody>
            <!-- INT1 -->
            <tr>
              <td class="diag-func">Can create with the language, combining and recombining learned material to provide personal information.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('int1'))]">{{ dPerf('int1') }}</span></td>
              <td class="diag-detail">
                <div class="dgl">Speaker needs to:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dHas('int1','needs','increase_vocab')}]">Increase vocabulary to be able to provide personal information</span>
                  <span :class="['dc',{checked:dHas('int1','needs','improve_listening')}]">Improve listening comprehension in order to respond to requests for information</span>
                  <span :class="['dc',{checked:dHas('int1','needs','produce_sentence_level')}]">Produce sentence level discourse and not just lists and phrases</span>
                </div>
              </td>
            </tr>
            <!-- INT2 -->
            <tr>
              <td class="diag-func">Can speak in sentences on a variety of familiar topics and routines.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('int2'))]">{{ dPerf('int2') }}</span></td>
              <td class="diag-detail">
                <div class="dgl">Speaker needs to:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dHas('int2','needs','words_phrases')}]">Words, lists of words and memorized phrases</span>
                  <span :class="['dc',{checked:dHas('int2','needs','some_sentences')}]">Some sentences, memorized phrases and words</span>
                  <span :class="['dc',{checked:dHas('int2','needs','mostly_sentences')}]">Mostly sentences, but sometimes just memorized phrases and lists of words</span>
                </div>
              </td>
            </tr>
            <!-- INT3 -->
            <tr>
              <td class="diag-func">Can handle a simple transaction by asking and answering questions.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('int3'))]">{{ dPerf('int3') }}</span></td>
              <td class="diag-detail">
                <div class="dgl">Speaker needs to:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dHas('int3','needs','formulate_questions')}]">Formulate questions correctly</span>
                  <span :class="['dc',{checked:dHas('int3','needs','produce_enough_questions')}]">Produce enough questions and responses to complete the transaction</span>
                </div>
              </td>
            </tr>
            <!-- INT4 -->
            <tr>
              <td class="diag-func">Is generally understood by those accustomed to dealing with non-native speakers.</td>
              <td class="diag-perf"><span :class="['perf-badge',perfClass(dPerf('int4'))]">{{ dPerf('int4') }}</span></td>
              <td class="diag-detail">
                <div class="dgl dcat">Speaker needs to improve: Fluency:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dHas('int4','fluency_checks','dead_ending')}]">Reduce "dead ending" (incomplete statements)</span>
                  <span :class="['dc',{checked:dHas('int4','fluency_checks','false_starts')}]">Reduce false-starts</span>
                  <span :class="['dc',{checked:dHas('int4','fluency_checks','repetition')}]">Reduce repetition</span>
                </div>
                <div class="dgl diag-na-note">Rate of speech / Pronunciation: <span>requires audio analysis — not evaluated</span></div>
                <div class="dgl">Grammar:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dHas('int4','grammar_checks','control_simple_grammar')}]">Needs control of simple sentence level grammar</span>
                  <span :class="['dc',{checked:dHas('int4','grammar_checks','create_complete_sentences')}]">Needs to create complete sentences</span>
                </div>
                <div class="dgl">Syntax:</div>
                <div class="dcc">
                  <span :class="['dc',{checked:dHas('int4','syntax_checks','improve_word_order')}]">Needs to improve sentence level word order</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- ── 문항별 결과 ── -->
      <div class="section">
        <div class="section-title">🗂 문항별 상세 결과 ({{ session.questions.length }}문항)</div>
        <div class="q-accordion">
          <div class="q-item" v-for="q in session.questions" :key="q.idx">
            <div class="q-header" @click="toggleQ(q.idx)">
              <div class="q-num">{{ q.idx + 1 }}</div>
              <div class="q-meta">
                <div class="q-title">{{ q.questionText || '(질문 없음)' }}</div>
                <div class="q-oneliner" v-if="perQOneLiner(q.idx)">{{ perQOneLiner(q.idx) }}</div>
              </div>
              <span :class="['q-grade-mini', 'grade-' + (perQGrade(q.idx) || 'IM2')]"
                    v-if="perQGrade(q.idx)">{{ perQGrade(q.idx) }}</span>
              <span class="q-chevron" :class="{ open: openQs.has(q.idx) }">▼</span>
            </div>
            <div class="q-body" :class="{ open: openQs.has(q.idx) }">

              <div class="q-section-label">📌 질문</div>
              <div class="q-text">{{ q.questionText || '(없음)' }}</div>

              <div class="q-section-label">🗣 내 답변</div>
              <div class="q-transcript" v-if="q.transcript">{{ q.transcript }}</div>
              <div class="q-no-transcript" v-else>음성 인식 결과 없음</div>

              <div class="q-section-label">🤖 AI 피드백</div>
              <div class="q-feedback" v-if="q.feedback" v-html="formatFeedback(q.feedback)"></div>
              <div v-else>
                <button class="btn-gen-feedback"
                        :disabled="generatingIdx === q.idx || !q.transcript"
                        @click="genFeedback(q)">
                  {{ generatingIdx === q.idx ? '⏳ 생성 중...' : '💬 피드백 생성' }}
                </button>
              </div>

            </div>
          </div>
        </div>
      </div>

    </template>

    <!-- ── 전체 피드백 실패 시 재시도 ── -->
    <template v-if="session && !overall && !loading">
      <div class="section" style="text-align:center;padding:32px">
        <p style="color:#888;margin-bottom:16px">전체 피드백을 불러오지 못했습니다.</p>
        <button class="btn-gen-feedback" style="font-size:.9em;padding:10px 24px" @click="loadOverall">
          🔄 전체 피드백 다시 요청
        </button>
      </div>
    </template>

  </div>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;
const SERVER = OPIcConfig.SERVER_URL;

const GRADE_ORDER = ['NH','IL','IM1','IM2','IM3','IH','AL','AM','AH'];

createApp({
  setup() {
    const loading     = ref(true);
    const loadingText = ref('시험 데이터 불러오는 중...');
    const session     = ref(null);
    const overall     = ref(null);
    const openQs      = ref(new Set());
    const generatingIdx = ref(-1);

    function toggleQ(idx) {
      const s = new Set(openQs.value);
      s.has(idx) ? s.delete(idx) : s.add(idx);
      openQs.value = s;
    }

    function perQGrade(idx) {
      if (!overall.value || !overall.value.perQuestion) return '';
      const found = overall.value.perQuestion.find(q => q.idx === idx);
      return found ? found.grade : '';
    }

    function perQOneLiner(idx) {
      if (!overall.value || !overall.value.perQuestion) return '';
      const found = overall.value.perQuestion.find(q => q.idx === idx);
      return found ? (found.oneLiner || '') : '';
    }

    function dHas(section, field, key) {
      const d = overall.value?.diagnostic;
      if (!d || !d[section]) return false;
      const arr = d[section][field];
      return Array.isArray(arr) && arr.includes(key);
    }
    function dGet(section, field) {
      const d = overall.value?.diagnostic;
      return d?.[section]?.[field] ?? '';
    }
    function dPerf(section) { return dGet(section, 'performance'); }
    function perfClass(perf) {
      if (!perf) return '';
      if (perf.includes('Fully'))         return 'perf-fully';
      if (perf.includes('Minimally'))     return 'perf-minimally';
      if (perf.includes('Developing'))    return 'perf-developing';
      if (perf.includes('Does Not'))      return 'perf-not-meet';
      return '';
    }

    function formatFeedback(raw) {
      const esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const parts = esc.split(/(?=^## )/m);
      let html = '';
      parts.forEach(part => {
        part = part.replace(/^## /, '');
        if (!part.trim()) return;
        const nl = part.indexOf('\n');
        const title = nl > -1 ? part.slice(0, nl).trim() : part.trim();
        const body  = nl > -1 ? part.slice(nl + 1) : '';
        let cls = 'generic';
        if (title.indexOf('📊') > -1)      cls = 'diagnosis';
        else if (title.indexOf('🔍') > -1) cls = 'analysis';
        else if (title.indexOf('⬆') > -1)  cls = 'tips';
        else if (title.indexOf('💎') > -1)  cls = 'diagnosis'; // 모범 답변 — primary 계열
        const lines = body.split('\n');
        let content = '', inList = false;
        lines.forEach(line => {
          const isList = /^[-•]\s/.test(line);
          if (isList && !inList)  { content += '<ul>'; inList = true; }
          if (!isList && inList) { content += '</ul>'; inList = false; }
          if (isList) {
            content += '<li>' + line.replace(/^[-•]\s/, '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') + '</li>';
          } else if (!line.trim()) {
            content += '';
          } else {
            content += line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') + '<br>';
          }
        });
        if (inList) content += '</ul>';
        html += `<div class="fb-ai-section ${cls}"><div class="fb-ai-section-title">${title}</div><div>${content}</div></div>`;
      });
      return html;
    }

    async function genFeedback(q) {
      if (!q.transcript) return;
      generatingIdx.value = q.idx;
      try {
        const r = await fetch(SERVER + '/feedback', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ questionText: q.questionText, transcript: q.transcript })
        });
        const d = await r.json();
        if (d.ok) {
          q.feedback = d.feedback;
          // 업데이트된 세션 저장
          localStorage.setItem('opic_session_result', JSON.stringify(session.value));
        }
      } catch(e) {}
      generatingIdx.value = -1;
    }

    async function loadOverall() {
      if (!session.value) return;
      loading.value = true;
      loadingText.value = 'GPT-4o가 전체 답변을 분석 중입니다...';
      try {
        const r = await fetch(SERVER + '/overall-feedback', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ questions: session.value.questions })
        });
        const d = await r.json();
        if (d.ok) {
          overall.value = d.result;
        }
      } catch(e) {}
      loading.value = false;
    }

    onMounted(async () => {
      // localStorage에서 세션 로드
      try {
        const raw = localStorage.getItem('opic_session_result');
        if (raw) session.value = JSON.parse(raw);
      } catch(e) {}

      if (!session.value || !session.value.questions.length) {
        loading.value = false;
        return;
      }

      // 첫 번째 문항 자동 열기
      openQs.value = new Set([session.value.questions[0].idx]);

      await loadOverall();
    });

    return {
      loading, loadingText, session, overall,
      openQs, toggleQ, perQGrade, perQOneLiner, loadOverall,
      formatFeedback, genFeedback, generatingIdx,
      dHas, dGet, dPerf, perfClass
    };
  }
}).mount('#app');
</script>
<script src="../assets/js/navbar.js"></script>
</body>
</html>
