<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPIc Practice</title>
    <link rel="stylesheet" href="../assets/css/noto-sans-kr.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f2f2f2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 헤더: navbar.js에서 주입 */

        /* Main */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 2px 2px 0 rgba(0,0,0,.12);
        }

        .card-header {
            background: #f2f2f2;
            border-bottom: 1px solid #dee2e6;
            padding: 20px 28px 18px;
        }
        .card-header h1 {
            font-size: 1.3em;
            font-weight: 700;
            color: #444;
            margin-bottom: 4px;
        }
        .card-header p {
            font-size: .82em;
            color: #888;
        }

        .card-body {
            padding: 24px 28px;
        }

        /* 메뉴 리스트 */
        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: #fff;
            border: 1px solid #dee2e6;
            text-decoration: none;
            color: #444;
            box-shadow: 0 2px 1px 0 rgba(0,0,0,.1);
            transition: border-color .12s;
        }
        .menu-item a:hover {
            border-color: #f63;
        }
        .menu-item a:hover .menu-arrow {
            color: #f63;
        }

        .menu-item.primary a {
            background: #f63;
            border-color: #f63;
            color: #fff;
            box-shadow: 0 2px 1px 0 rgba(0,0,0,.2);
        }
        .menu-item.primary a:hover {
            background: #e55;
            border-color: #e55;
        }
        .menu-item.primary .menu-arrow {
            color: rgba(255,255,255,.7);
        }

        .menu-title {
            font-size: .9em;
            font-weight: 700;
        }
        .menu-desc {
            font-size: .76em;
            margin-top: 2px;
            opacity: .7;
        }
        .menu-arrow {
            font-size: .8em;
            color: #bbb;
            flex-shrink: 0;
            margin-left: 12px;
        }

        /* Footer info */
        .card-footer {
            border-top: 1px solid #dee2e6;
            padding: 14px 28px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .info-item {
            font-size: .76em;
            color: #999;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .info-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #51bb39;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <main class="main">
        <div class="card">
            <div class="card-header">
                <h1>Speaking Test</h1>
                <p>브라우저에서 실행되는 OPIc 시험 시뮬레이터</p>
            </div>

            <div class="card-body">
                <ul class="menu-list">
                    <li class="menu-item primary">
                        <a href="../pages/survey-clone.html" onclick="localStorage.clear()">
                            <div>
                                <div class="menu-title">시험 응시하기</div>
                                <div class="menu-desc">Background Survey부터 실전 테스트까지</div>
                            </div>
                            <span class="menu-arrow">›</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="my-records.html">
                            <div>
                                <div class="menu-title">내 기록</div>
                                <div class="menu-desc">저장된 피드백과 모범답변 확인</div>
                            </div>
                            <span class="menu-arrow">›</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="admin.html">
                            <div>
                                <div class="menu-title">관리자</div>
                                <div class="menu-desc">주제 및 문제 음성 관리</div>
                            </div>
                            <span class="menu-arrow">›</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="card-footer">
                <span class="info-item">
                    <span class="info-dot"></span>
                    마이크 권한 필요
                </span>
                <span class="info-item">
                    <span class="info-dot"></span>
                    Chrome 권장
                </span>
                <span class="info-item">
                    <span class="info-dot"></span>
                    TTS 서버 별도 실행
                </span>
            </div>
        </div>
    </main>

    <script src="/assets/js/navbar.js"></script>
</body>
</html>
